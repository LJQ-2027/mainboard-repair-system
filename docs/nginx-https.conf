# Nginx HTTPS 反代配置
# 用于生产环境（端口 8899 → 443 HTTPS）
#
# 前提：
#   1. 已安装 certbot 并获取 SSL 证书
#   2. 域名 DNS 已指向服务器
#
# 部署步骤：
#   1. 复制此文件到 /etc/nginx/sites-available/mainboard-repair
#   2. 修改 YOUR_DOMAIN 为实际域名
#   3. sudo ln -s /etc/nginx/sites-available/mainboard-repair /etc/nginx/sites-enabled/
#   4. sudo certbot --nginx -d YOUR_DOMAIN
#   5. sudo systemctl reload nginx

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # certbot 验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 服务
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL 证书（由 certbot 管理）
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # 现代 SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS（确认 HTTPS 稳定后取消注释）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 安全头部（与后端中间件互补）
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 客户端上传大小限制
    client_max_body_size 20M;

    # 反向代理到 FastAPI
    location / {
        proxy_pass http://127.0.0.1:8899;
        proxy_http_version 1.1;

        # 必要的代理头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 静态资源缓存
    location /data/ {
        proxy_pass http://127.0.0.1:8899;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location /js/ {
        proxy_pass http://127.0.0.1:8899;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location /v2/ {
        proxy_pass http://127.0.0.1:8899;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # 禁止访问敏感路径
    location ~ /\.(?!well-known) {
        deny all;
    }
}
