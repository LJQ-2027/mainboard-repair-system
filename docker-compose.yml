version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mainboard-repair-db
    environment:
      POSTGRES_USER: mainboard
      POSTGRES_PASSWORD: mainboard_pass
      POSTGRES_DB: mainboard_repair
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mainboard -d mainboard_repair"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: mainboard-repair
    ports:
      - "8899:8899"
    volumes:
      - ./backend/app:/app/backend/app # 开发热重载（可选）
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://mainboard:mainboard_pass@db:5432/mainboard_repair}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-kimi-code}
      - AI_MODEL=${AI_MODEL:-kimi-k2-thinking}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8899/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
